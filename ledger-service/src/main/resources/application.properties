spring.application.name=ledger-service



server.port=8094

spring.datasource.url=jdbc:mysql://localhost:3306/paypal_ledgerdb?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=yash8252
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true


logging.level.org.springframework.kafka=INFO
logging.level.com.paypalclone.user_service=DEBUG


# Kafka bootstrap
spring.kafka.bootstrap-servers=localhost:9092

# Producer config
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Consumer base (already mostly handled by your @Configuration)
spring.kafka.consumer.auto-offset-reset=earliest



resilience4j.circuitbreaker.instances.ledgerServiceCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ledgerServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.ledgerServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.ledgerServiceCB.permittedNumberOfCallsInHalfOpenState=3

resilience4j.retry.instances.ledgerServiceRetry.maxAttempts=3
resilience4j.retry.instances.ledgerServiceRetry.waitDuration=2s

resilience4j.timelimiter.instances.ledgerServiceTimeout.timeoutDuration=3s

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

management.prometheus.metrics.export.enabled=true
management.tracing.sampling.probability=1.0
