apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: yash01er/auth-service:1.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8090

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker

            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/paypal_authdb?allowPublicKeyRetrieval=true&useSSL=false
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: yash8252

            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka

            - name: JWT_SECRET
              value: mysupersecurekeyformysafarsaathijwt1234567890abcdefABCDEF1234567890

            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              value: http://zipkin:9411/api/v2/spans