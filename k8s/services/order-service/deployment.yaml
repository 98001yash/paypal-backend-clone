apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: yash01er/order-service:1.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8096

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://discovery-server:8761/eureka

            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/paypal

            - name: SPRING_DATASOURCE_USERNAME
              value: root

            - name: SPRING_DATASOURCE_PASSWORD
              value: yash8252

            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092